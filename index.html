<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPM Counter</title>
  <link href="./css/style.css" rel="stylesheet" type="text/css">
</head>

<body>
  <div style="padding:calc(20 / 16 * 1em);">
    <h1>BPM Counter<br><span class="min">(Mic Input / Auto / FX)</span></h1>
    <div style="text-align: center;">
      <button id="startBtn">Start</button>

      <div id="bpm">--</div>
      <div id="gainControls">
        <div>
          <label>
            <input type="checkbox" id="autoGainToggle" checked> Auto Gain
          </label>
          <label>
            <input type="checkbox" id="effectToggle" checked> FX
          </label>
        </div>
        <div>
          <span>
            <input type="range" id="manualGainSlider" min="1" max="30" value="5" step="0.1" disabled>
          </span>
          <span id="manualGainValue">5</span>
        </div>
      </div>
      <div id="autoStatus">AUTO: --</div>
      <div id="debug">min: -- max: -- range: --</div>
    </div>
  </div>

  <canvas id="waveCanvas" width="320" height="200"></canvas>
  <canvas id="scrollingWaveCanvas" width="320" height="70" style="display: block; border-top: 1px solid #333;"></canvas>

  <script type="module">

    const startBtn = document.getElementById("startBtn");
    const bpmDisplay = document.getElementById("bpm");
    const autoStatus = document.getElementById("autoStatus");
    const debug = document.getElementById("debug");

    const autoGainToggle = document.getElementById("autoGainToggle");
    const effectToggle = document.getElementById("effectToggle");
    const manualGainSlider = document.getElementById("manualGainSlider");
    const manualGainValue = document.getElementById("manualGainValue");

    autoGainToggle.addEventListener("change", (e) => {
      manualGainSlider.disabled = e.target.checked;
    });

    manualGainSlider.addEventListener("input", (e) => {
      manualGainValue.textContent = e.target.value;
    });

    const canvas = document.getElementById("waveCanvas");
    const ctx = canvas.getContext("2d");

    const scrollingCanvas = document.getElementById("scrollingWaveCanvas");
    const scrollCtx = scrollingCanvas.getContext("2d");
    const waveHistory = [];

    // -----------------------------
    // Wake Lock（スリープ防止）
    // -----------------------------
    let wakeLock = null;
    async function enableWakeLock() {
      try {
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => {
          console.log("Wake Lock released");
          wakeLock = null;
        });
      } catch (err) {
        console.error("WakeLock error:", err);
      }
    }

    // -----------------------------
    // 自動ゲイン（上限30程度）
    // -----------------------------
    function autoGain(min, max) {
      const center = 128;
      const level = Math.max(Math.abs(min - center), Math.abs(max - center));

      // 振幅レベルに対するゲインの基準点 [レベル, ゲイン]
      const gainMap = [
        [0, 30],
        [2, 30],    // ほぼ無音
        [4, 25],    // 超小音量
        [8, 20],    // 小音量
        [15, 12],   // 中音量
        [30, 6],    // そこそこ音がある
        [60, 3],    // 大音量
        [90, 1.5],  // 最大近い
        [128, 0.8]  // 最大レベルの時はゲインを下げて音割れを防ぐ
      ];

      for (let i = 0; i < gainMap.length - 1; i++) {
        const currentRef = gainMap[i];
        const nextRef = gainMap[i + 1];

        if (level >= currentRef[0] && level <= nextRef[0]) {
          const l1 = currentRef[0];
          const g1 = currentRef[1];
          const l2 = nextRef[0];
          const g2 = nextRef[1];

          if (l1 === l2) return g1;

          const ratio = (level - l1) / (l2 - l1);
          const interpolatedGain = g1 + (g2 - g1) * ratio;

          return Math.round(interpolatedGain * 10) / 10; // 小数第1位で刻む
        }
      }
      return 2;
    }

    // -----------------------------
    // BPM Worker連携
    // -----------------------------
    function flattenChunks(chunks, totalSamples) {
      const merged = new Float32Array(totalSamples);
      let offset = 0;
      for (const chunk of chunks) {
        merged.set(chunk, offset);
        offset += chunk.length;
      }
      return merged;
    }

    function createBpmWorker() {
      return new Worker("./bpm-worker.js?v=" + Date.now());
    }

    // -----------------------------
    // Start
    // -----------------------------
    startBtn.addEventListener("click", async () => {
      startBtn.disabled = true;
      startBtn.textContent = "Listening...";

      await enableWakeLock();
      bpmDisplay.textContent = "--";

      const stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          noiseSuppression: false,
          echoCancellation: false,
          autoGainControl: false,
          sampleRate: 44100
        },
        video: false
      });
      const audioContext = new AudioContext({ sampleRate: 44100 });
      await audioContext.resume();
      console.log("AudioContext sampleRate:", audioContext.sampleRate);

      // Inline AudioWorklet setup for capturing audio chunks off-main-thread with zero-copy transfers
      const processorCode = `
        class BpmAudioProcessor extends AudioWorkletProcessor {
          constructor() {
            super();
            this.bufferSize = 2048;
            this.buffer = new Float32Array(this.bufferSize);
            this.writeIndex = 0;
          }

          process(inputs, outputs, parameters) {
            const input = inputs[0];
            if (!input || input.length === 0) return true;
            const channelData = input[0];
            if (!channelData || channelData.length === 0) return true;

            let readIndex = 0;
            const inputLength = channelData.length;

            while (readIndex < inputLength) {
              const remainingSpace = this.bufferSize - this.writeIndex;
              const samplesToCopy = Math.min(inputLength - readIndex, remainingSpace);
              
              this.buffer.set(channelData.subarray(readIndex, readIndex + samplesToCopy), this.writeIndex);
              
              this.writeIndex += samplesToCopy;
              readIndex += samplesToCopy;

              if (this.writeIndex >= this.bufferSize) {
                this.port.postMessage(this.buffer, [this.buffer.buffer]);
                this.buffer = new Float32Array(this.bufferSize);
                this.writeIndex = 0;
              }
            }
            return true;
          }
        }
        registerProcessor('bpm-audio-processor', BpmAudioProcessor);
      `;
      const blob = new Blob([processorCode], { type: "application/javascript" });
      const processorUrl = URL.createObjectURL(blob);
      await audioContext.audioWorklet.addModule(processorUrl);

      const bpmWorker = createBpmWorker();
      let workerBusy = false;
      let workerReady = false;

      bpmWorker.onmessage = (event) => {
        const { type, bpm, error } = event.data || {};
        if (type === "ready") {
          workerReady = true;
          return;
        }

        if (type === "result") {
          workerBusy = false;
          if (typeof bpm === "number" && Number.isFinite(bpm) && bpm > 0) {
            bpmDisplay.textContent = (Math.round(bpm * 10) / 10).toString();
          }
          if (error) {
            console.error("BPM worker error:", error);
          }
        }
      };

      bpmWorker.onerror = (err) => {
        workerBusy = false;
        console.error("BPM worker crashed:", err);
      };
      window.addEventListener("beforeunload", () => {
        bpmWorker.terminate();
      });

      const source = audioContext.createMediaStreamSource(stream);

      // Pause analysis when app is backgrounded & re-acquire Wake Lock on focus
      document.addEventListener('visibilitychange', async () => {
        if (document.hidden) {
          audioContext.suspend();
        } else {
          audioContext.resume();
          if (startBtn.disabled && !wakeLock) {
            await enableWakeLock();
          }
        }
      });

      // -----------------------------
      // エフェクトチェーン
      // -----------------------------

      // 1. 超低音域のカット（DCオフセットやマイク吹かれ防止）
      const hp = audioContext.createBiquadFilter();
      hp.type = "highpass";
      hp.frequency.value = 15;

      // 2. 低音(ドン)の強調 (Low Shelf)
      const lowShelf = audioContext.createBiquadFilter();
      lowShelf.type = "lowshelf";
      lowShelf.frequency.value = 150; // 150Hz以下をブースト
      lowShelf.gain.value = 14;       // +14dB

      // 3. 中音域のカット (Peaking) - スッキリさせる
      const midCut = audioContext.createBiquadFilter();
      midCut.type = "peaking";
      midCut.frequency.value = 2000;  // 2kHzを中心にカット
      midCut.Q.value = 1.0;
      midCut.gain.value = -20;         // -20dB

      // 4. 高音(シャリ)の強調 (High Shelf)
      const highShelf = audioContext.createBiquadFilter();
      highShelf.type = "highshelf";
      highShelf.frequency.value = 6000; // 6kHz以上をブースト
      highShelf.gain.value = 14;        // +14dB

      // 5. Compressor（ブーストによるピークを抑え、音割れを防ぐ）
      const comp = audioContext.createDynamicsCompressor();
      comp.threshold.value = -24;
      comp.knee.value = 20;
      comp.ratio.value = 4;
      comp.attack.value = 0.01;
      comp.release.value = 0.2;

      // 自動ゲイン
      const gain = audioContext.createGain();
      gain.gain.value = 5; // EQでブーストされるため初期値は少し低めに

      // Analyser（波形表示 & 自動調整）
      const analyser = audioContext.createAnalyser();
      analyser.fftSize = 2 ** 10;
      analyser.smoothingTimeConstant = 0.15;

      // BPM Analyzer（essentia.js） - Using the modern AudioWorkletNode
      const bpmProcessor = new AudioWorkletNode(audioContext, "bpm-audio-processor");
      const bpmMute = audioContext.createGain();
      bpmMute.gain.value = 0;
      bpmProcessor.connect(bpmMute);
      bpmMute.connect(audioContext.destination);

      const bpmChunks = [];
      let bpmTotalSamples = 0;
      const maxSamples = Math.floor(audioContext.sampleRate * 12);
      const minSamplesForEstimation = Math.floor(audioContext.sampleRate * 6);
      let lastBpmEstimateAt = 0;

      // 接続の切り替え関数
      function updateEffectRouting() {
        source.disconnect();
        hp.disconnect();
        lowShelf.disconnect();
        midCut.disconnect();
        highShelf.disconnect();
        comp.disconnect();
        gain.disconnect();
        analyser.disconnect();

        if (effectToggle.checked) {
          source.connect(hp);
          hp.connect(lowShelf);
          lowShelf.connect(midCut);
          midCut.connect(highShelf);
          highShelf.connect(comp);
          comp.connect(gain);
        } else {
          // エフェクトオフ時は超低音カット(hp)から直接gainへ
          source.connect(hp);
          hp.connect(gain);
        }

        gain.connect(analyser);
        gain.connect(bpmProcessor);
      }

      updateEffectRouting();
      effectToggle.addEventListener("change", updateEffectRouting);

      bpmProcessor.port.onmessage = (event) => {
        const input = event.data; // Float32Array of size 2048 from the worklet thread
        // We own this buffer, so we can push it directly without copying!
        bpmChunks.push(input);
        bpmTotalSamples += input.length;

        while (bpmTotalSamples > maxSamples && bpmChunks.length > 0) {
          const removed = bpmChunks.shift();
          bpmTotalSamples -= removed.length;
        }

        const now = performance.now();
        if (bpmTotalSamples < minSamplesForEstimation || now - lastBpmEstimateAt < 4000) {
          return;
        }
        if (!workerReady || workerBusy || document.hidden) return;
        lastBpmEstimateAt = now;

        const signal = flattenChunks(bpmChunks, bpmTotalSamples);
        workerBusy = true;
        bpmWorker.postMessage(
          {
            type: "estimate",
            signal: signal,
            sampleRate: audioContext.sampleRate
          },
          [signal.buffer]
        );
      };

      // -----------------------------
      // 波形描画
      // -----------------------------
      let lastFlashTime = 0; // 点滅制御用
      let trackedMin = 255;  // ここから次の調整ループまでの最小値
      let trackedMax = 0;    // ここから次の調整ループまでの最大値

      function drawWave() {
        requestAnimationFrame(drawWave);

        const buffer = new Uint8Array(analyser.fftSize);
        analyser.getByteTimeDomainData(buffer);

        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // --- グラフィックイコライザー（スペクトラム）描画 ---
        const freqBuffer = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(freqBuffer);

        const barWidth = 10;
        const gap = 1;
        const barsCount = Math.floor(canvas.width / (barWidth + gap));
        const usableBins = Math.floor(analyser.frequencyBinCount * 0.6); // 高音域すぎないところまで
        const step = Math.max(1, Math.floor(usableBins / barsCount));

        let barX = 0;
        for (let i = 0; i < barsCount; i++) {
          let sum = 0;
          for (let j = 0; j < step; j++) {
            const index = i * step + j;
            if (index < freqBuffer.length) {
              sum += freqBuffer[index];
            }
          }
          const avg = sum / step;
          const barHeight = (avg / 255) * canvas.height;

          // 周波数の高さで色を変える（低音:青っぽく → 高音:紫・ピンクっぽく）
          const hue = 220 + (i / barsCount) * 140;
          ctx.fillStyle = `hsla(${hue}, 100%, 60%, 0.6)`;
          ctx.fillRect(barX, canvas.height - barHeight, barWidth, barHeight);

          barX += barWidth + gap;
        }

        // --- 横軸（周波数の目盛り）の描画 ---
        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        ctx.font = "10px sans-serif";
        ctx.textAlign = "center";

        // 表示したい周波数の目安
        const targetFrequencies = [250, /* 500, */ 1000, 2000, 4000, 8000, 12000];
        const nyquist = audioContext.sampleRate / 2;

        targetFrequencies.forEach(freq => {
          // 対象周波数がどのビンに属するか、さらにどのバーに対応するかを逆算
          const binIndex = freq * analyser.frequencyBinCount / nyquist;
          const barIndex = binIndex / step;

          // 表示範囲内に収まっている場合のみ描画
          if (barIndex < barsCount) {
            const xPos = barIndex * (barWidth + gap) + (barWidth / 2);
            const text = freq >= 1000 ? (freq / 1000) + "k" : freq;

            // 小さな目盛りの縦線
            ctx.beginPath();
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.lineWidth = 1;
            ctx.moveTo(xPos, canvas.height);
            ctx.lineTo(xPos, canvas.height - 15);
            ctx.stroke();

            // 周波数のテキスト（目盛りの少し上に配置）
            ctx.fillText(text, xPos, canvas.height - 18);
          }
        });

        // --- オシロスコープ波形（時間領域）描画 ---
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#0f0";
        ctx.beginPath();

        const slice = canvas.width / buffer.length;
        let x = 0;

        let minVal = 255;
        let maxVal = 0;

        for (let i = 0; i < buffer.length; i++) {
          const val = buffer[i];
          if (val < minVal) minVal = val;
          if (val > maxVal) maxVal = val;

          const v = val / 255;
          const y = v * canvas.height;

          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);

          x += slice;
        }

        ctx.stroke();

        // 常に最大振幅を更新していく（次のsetIntervalまでの間）
        if (minVal < trackedMin) trackedMin = minVal;
        if (maxVal > trackedMax) trackedMax = maxVal;

        // -----------------------------
        // ピーク（ビート）検知でボタン点滅
        // -----------------------------
        const range = maxVal - minVal;
        const now = Date.now();

        let isBeat = false;
        // 波形の振幅が一定以上で、かつ前回の点滅から150ms以上経過している場合（連打防止）
        if (range > 110 && now - lastFlashTime > 150) {
          isBeat = true;
          lastFlashTime = now;
          startBtn.classList.add("btn-flash");
          setTimeout(() => {
            startBtn.classList.remove("btn-flash");
          }, 100); // 100msで光を消す
        }

        // -----------------------------
        // 流れる波形の描画
        // -----------------------------
        const PLAYHEAD_RATIO = 1; // プレイヘッドの位置（右端）
        const maxHistory = Math.floor(scrollingCanvas.width * PLAYHEAD_RATIO);

        waveHistory.push({ min: minVal / 255, max: maxVal / 255, isBeat: isBeat });
        if (waveHistory.length > maxHistory) {
          waveHistory.shift();
        }

        scrollCtx.fillStyle = "#000";
        scrollCtx.fillRect(0, 0, scrollingCanvas.width, scrollingCanvas.height);

        const playheadX = Math.floor(scrollingCanvas.width * PLAYHEAD_RATIO);

        scrollCtx.lineWidth = 1;
        for (let i = 0; i < waveHistory.length; i++) {
          const data = waveHistory[i];
          const x = playheadX - (waveHistory.length - 1 - i);

          const yMin = data.min * scrollingCanvas.height;
          const yMax = data.max * scrollingCanvas.height;

          // 黄色波形
          scrollCtx.strokeStyle = "#ebff00";
          scrollCtx.beginPath();
          scrollCtx.moveTo(x, yMin);
          scrollCtx.lineTo(x, yMax);
          scrollCtx.stroke();

          // ビートの赤いマーカー
          if (data.isBeat) {
            scrollCtx.strokeStyle = "rgba(250, 150, 150, 0.9)";
            scrollCtx.beginPath();
            scrollCtx.moveTo(x, 0);
            scrollCtx.lineTo(x, 10);
            scrollCtx.moveTo(x, scrollingCanvas.height - 10);
            scrollCtx.lineTo(x, scrollingCanvas.height);
            scrollCtx.stroke();
          }
        }

        // 上下の白い点線
        scrollCtx.strokeStyle = "rgba(255, 255, 255, 0.4)";
        scrollCtx.setLineDash([5, 5]);
        scrollCtx.beginPath();
        scrollCtx.moveTo(0, 10);
        scrollCtx.lineTo(scrollingCanvas.width, 10);
        scrollCtx.moveTo(0, scrollingCanvas.height - 10);
        scrollCtx.lineTo(scrollingCanvas.width, scrollingCanvas.height - 10);
        scrollCtx.stroke();
        scrollCtx.setLineDash([]); // リセット

        // 黄色のプレイヘッド（現在位置）
        // scrollCtx.strokeStyle = "#ffcc00";
        // scrollCtx.lineWidth = 2;
        // scrollCtx.beginPath();
        // scrollCtx.moveTo(playheadX, 0);
        // scrollCtx.lineTo(playheadX, scrollingCanvas.height);
        // scrollCtx.stroke();
      }

      drawWave();

      // -----------------------------
      // 自動調整ループ
      // -----------------------------
      setInterval(() => {
        // drawWave側で継続記録された最大・最小値を使う
        let min = trackedMin;
        let max = trackedMax;

        // 次のループ期間のためにリセット
        trackedMin = 255;
        trackedMax = 0;

        // 音が全く無い初期状態のケア
        if (min > max) {
          min = 128;
          max = 128;
        }

        const range = max - min;

        debug.textContent = `min:${min} max:${max} range:${range}`;

        // smoothing は range で調整
        if (range < 10) analyser.smoothingTimeConstant = 0.1;
        else if (range < 30) analyser.smoothingTimeConstant = 0.2;
        else if (range < 60) analyser.smoothingTimeConstant = 0.3;
        else analyser.smoothingTimeConstant = 0.4;

        // ★ ゲイン設定
        if (autoGainToggle.checked) {
          const newGain = autoGain(min, max);
          // gain.gain.value に直接代入すると、不連続な音量変化によるノイズ（クリック音）が発生し、
          // アナライザーがビートと誤認する原因になるため、滑らかに値を変化させます。
          gain.gain.setTargetAtTime(newGain, audioContext.currentTime, 0.2);

          // 自動で動いている感を出すためスライダーの見た目も同期する
          manualGainSlider.value = newGain;
          manualGainValue.textContent = newGain;

          autoStatus.textContent =
            `AUTO: gain=${newGain}, smoothing=${analyser.smoothingTimeConstant}`;
        } else {
          const manualGain = Number(manualGainSlider.value);
          gain.gain.setTargetAtTime(manualGain, audioContext.currentTime, 0.2);

          autoStatus.textContent =
            `MANUAL: gain=${manualGain}, smoothing=${analyser.smoothingTimeConstant}`;
        }
      }, 800);

    });

    // wave
    function resizeCanvases() {
      waveCanvas.width = window.innerWidth;
      scrollingCanvas.width = window.innerWidth;
    }
    resizeCanvases();
    window.addEventListener('resize', resizeCanvases);
  </script>
</body>

</html>
